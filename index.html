<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChatGPT 风格对话助手</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  display: flex;
  height: 100vh;
  background: #ffffff;
  color: #333;
}

.sidebar {
  width: 220px;
  background: #f7f7f8;
  border-right: 1px solid #e5e5e5;
  display: flex;
  flex-direction: column;
  padding: 12px;
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  overflow-y: auto;
}

.sidebar-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding: 0 4px;
}
.logo {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: bold;
}
.icon-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: 1px solid #ddd;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.menu-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 14px;
  cursor: pointer;
}
.menu-item.active {
  background: #e5e5e5;
}

.sidebar-bottom {
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px solid #e5e5e5;
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #b8860b;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: bold;
}
.user-info {
  flex: 1;
}
.user-name {
  font-size: 14px;
  font-weight: 500;
}
.user-tag {
  font-size: 12px;
  color: #666;
}
.upgrade-btn {
  padding: 6px 12px;
  border: 1px solid #ddd;
  border-radius: 6px;
  background: #fff;
  font-size: 12px;
  cursor: pointer;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  margin-left: 220px;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid #e5e5e5;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 18px;
  font-weight: 500;
}
.plus-btn {
  padding: 8px 16px;
  border-radius: 20px;
  background: #ede9fe;
  color: #7c3aed;
  border: none;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.icon-group {
  display: flex;
  gap: 16px;
}
.icon {
  font-size: 20px;
  cursor: pointer;
}

.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px;
}
.chat-title {
  font-size: 28px;
  font-weight: 500;
  margin-bottom: 20px;
}

.input-container {
  width: 100%;
  max-width: 700px;
  position: relative;
}
#userInput {
  width: 100%;
  padding: 16px 56px;
  border: 1px solid #e5e5e5;
  border-radius: 24px;
  font-size: 16px;
  outline: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.input-icon-left {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  color: #999;
}
.input-icon-right {
  position: absolute;
  right: 56px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  color: #999;
}
.send-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: #168cff;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.api-container {
  width: 100%;
  max-width: 700px;
  margin-bottom: 20px;
}
#apiKey {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid #e5e5e5;
  border-radius: 12px;
  font-size: 14px;
  outline: none;
}

.messages {
  width: 100%;
  max-width: 700px;
  height: 400px;
  overflow-y: auto;
  margin-bottom: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.message {
  display: flex;
  gap: 12px;
}
.message-avatar {
  width: 30px;
  height: 30px;
  border-radius: 4px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: bold;
}
.message-user .message-avatar {
  background: #168cff;
}
.message-bot .message-avatar {
  background: #10a37f;
}
.message-content {
  line-height: 1.6;
  font-size: 15px;
  max-width: 90%;
  white-space: pre-wrap;
}

.tips {
  width: 100%;
  max-width: 700px;
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 12px;
  color: #666;
}
.error {
  color: #ff4444;
}
.loading {
  color: #168cff;
}

/* ====================== ✅ 只加了这段自适应，其他完全不动 ====================== */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
    z-index: 999;
    transition: 0.3s;
  }
  .main {
    margin-left: 0;
  }
  .chat-area {
    padding: 16px;
  }
  .messages {
    height: 350px;
  }
}
</style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="logo">G</div>
      <div class="icon-btn"></div>
    </div>
    <div class="menu-item active">
      <span>✎</span> 新聊天
    </div>
    <div class="menu-item">
      <span>Q</span> 搜索聊天
    </div>
    <div class="menu-item">
      <span>♾️</span> Codex
    </div>
    <div class="menu-item">
      <span>…</span> 更多
    </div>
    <div class="sidebar-bottom">
      <div class="user-avatar">X</div>
      <div class="user-info">
        <div class="user-name">xiangjie</div>
        <div class="user-tag">免费版</div>
      </div>
      <button class="upgrade-btn">升级</button>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <div class="header-left">
        <span>ChatGPT</span>
        <span>⌄</span>
      </div>
      <div class="header-right">
        <button class="plus-btn">✨ 获取 Plus</button>
        <div class="icon-group">
          <span class="icon">👤+</span>
          <span class="icon">♻</span>
        </div>
      </div>
    </div>

    <div class="chat-area">
      <div class="chat-title">有什么可以帮忙的？</div>
      <div class="api-container">
        <input type="password" id="apiKey" placeholder="请输入阿里云百炼 API Key">
      </div>
      <div class="messages" id="chatBox"></div>
      <div class="input-container">
        <span class="input-icon-left">+</span>
        <input type="text" id="userInput" placeholder="有问题，尽管问">
        <span class="input-icon-right">🎤</span>
        <button class="send-btn" id="sendBtn">🔊</button>
      </div>
      <div class="tips">
        <div id="error" class="error"></div>
        <div id="loading" class="loading">思考中…</div>
        <button id="clearBtn">清空对话</button>
      </div>
    </div>
  </div>

<script>
const apiKey = document.getElementById('apiKey');
const chatBox = document.getElementById('chatBox');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const clearBtn = document.getElementById('clearBtn');
const loading = document.getElementById('loading');
const error = document.getElementById('error');

let messages = [];
loading.style.display = 'none';

sendBtn.onclick = sendMessage;
userInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
    }
});
clearBtn.onclick = () => { messages = []; chatBox.innerHTML = ''; setError(''); };

async function sendMessage() {
  const key = apiKey.value.trim();
  const text = userInput.value.trim();
  if (!key) { setError('请输入 API Key'); return; }
  if (!text) { setError('请输入内容'); return; }

  messages.push({ role: 'user', content: text });
  addMessage('user', text);
  userInput.value = '';

  setLoading(true);
  setError('');

  try {
    const res = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + key,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'qwen3.6-plus',
        messages: messages
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || '请求失败');
    const reply = data.choices[0].message.content;
    messages.push({ role: 'assistant', content: reply });

    const div = document.createElement('div');
    div.className = 'message message-bot';
    const avatar = document.createElement('div');
    avatar.className = 'message-avatar';
    avatar.textContent = 'AI';
    const content = document.createElement('div');
    content.className = 'message-content';
    content.textContent = '';
    div.appendChild(avatar);
    div.appendChild(content);
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;

    let i = 0;
    function type() {
      if (i < reply.length) {
        content.textContent += reply.charAt(i);
        i++;
        chatBox.scrollTop = chatBox.scrollHeight;
        setTimeout(type, 16);
      }
    }
    type();

  } catch (e) {
    setError('错误：' + e.message);
  } finally {
    setLoading(false);
  }
}

function addMessage(role, txt) {
  const div = document.createElement('div');
  div.className = role === 'user' ? 'message message-user' : 'message message-bot';
  const avatar = document.createElement('div');
  avatar.className = 'message-avatar';
  avatar.textContent = role === 'user' ? '你' : 'AI';
  const content = document.createElement('div');
  content.className = 'message-content';
  content.textContent = txt;
  div.appendChild(avatar);
  div.appendChild(content);
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function setLoading(v) {
  loading.style.display = v ? 'block' : 'none';
  sendBtn.disabled = v;
}

function setError(msg) {
  error.textContent = msg;
}
</script>
</body>
</html>
